name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: pip install "ruff==0.15.14"

      - name: Ruff check
        run: ruff check . --output-format=github

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pytest==9.0.3"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  security:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install bandit
        run: pip install "bandit[toml]==1.8.3"

      - name: Run bandit
        run: |
          bandit -r app/ tools/run/ github_agent/ \
            --severity-level medium \
            --confidence-level medium \
            --skip B310,B602,B603,B607 \
            --format txt
        # B602: shell=True is intentional in bash.py (gated by denylist) and sandbox.py (hardcoded cmd, AR-002)
        # B310: urlopen in llm.py/llm_client.py/local_server.py targets localhost Ollama — not user input

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import core modules
        run: |
          python -c "from app.router import RouteResult; print('✓ Router')"
          python -c "from app.agent.circuit_breaker import CircuitBreaker; print('✓ CircuitBreaker')"
          python -c "from app.agent import working_memory; print('✓ Memory')"
          python -c "from app.agent.planner import build_plan_prompt; print('✓ Planner')"
          python -c "from app.agent.retriever import Retriever; print('✓ Retriever')"
          python -c "from app.agent.sandbox import validate_before_push; print('✓ Sandbox')"
          python -c "import app.agent.task_buffer; print('✓ TaskBuffer')"
          python -c "from app.personality import ready, tool_narrate; print('✓ Personality')"
          python -c "from app.errors import ShardRuntimeError, TransportError; print('✓ Errors')"

      - name: Verify tool registry
        run: |
          python -c "
          import json, pathlib
          reg = json.loads(pathlib.Path('tools/run/registry.json').read_text())
          count = len(reg) if isinstance(reg, dict) else len(reg)
          print(f'✓ Tool registry: {count} tools registered')
          assert count > 0, 'No tools in registry'
          "

      - name: Verify project structure
        run: |
          python -c "
          from pathlib import Path
          required = [
              'run.py', 'requirements.txt', 'README.md',
              'app/chat.py', 'app/router.py', 'app/personality.py',
              'prompts/J-system.txt', 'tools/run/registry.json',
          ]
          missing = [f for f in required if not Path(f).exists()]
          assert not missing, f'Missing files: {missing}'
          print('✓ All required files present')
          "
