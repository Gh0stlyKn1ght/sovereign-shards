name: J Agent

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

# One agent run per issue/PR at a time; cancel the stale run when a new one starts.
concurrency:
  group: j-agent-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  J_LLM_BACKEND: github_models
  J_MODEL: gpt-4o-mini
  J_TOOL_BUDGET: 3

jobs:
  run-j-agent:
    name: Run J Agent
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
      || (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/j'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run J agent
        run: |
          python github_agent/run.py

      - name: Post response comment
        if: github.event_name == 'issue_comment' || github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const response = fs.readFileSync('j_response.md', 'utf8');
            const issueNumber = context.issue?.number || context.payload.pull_request?.number;
            if (issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: response,
              });
            }
