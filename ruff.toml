# Ruff linter configuration — Sovereign Shards
# https://docs.astral.sh/ruff/

target-version = "py311"
line-length = 120

[lint]
select = ["E", "F", "W"]
ignore = [
    "E402",   # module-import-not-at-top — common pattern in tests & CLI scripts
    "E501",   # line-too-long — handled by line-length=120; remaining are acceptable
    "E741",   # ambiguous-variable-name — `l` in comprehensions is idiomatic
    "F401",   # unused-import — kept for re-export in public surfaces; clean up gradually
    "F541",   # f-string-missing-placeholders — harmless, auto-fixable later
]
# e2e_runner requires a live LLM server — excluded from CI entirely
exclude = ["tests/e2e_runner.py"]

[lint.per-file-ignores]
# exec.py injects names into a restricted globals dict at runtime; F821 false-positives
# are expected and the sandbox test suite covers the real behaviour.
"tools/run/exec.py" = ["F821"]
"tests/e2e_runner.py" = ["F821", "F401"]
